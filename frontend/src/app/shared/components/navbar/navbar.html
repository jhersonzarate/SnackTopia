<nav class="navbar">
  <div class="container navbar__inner">
    <!-- Hamburger mobile -->
    <button class="hamburger" (click)="toggleMenu()" [class.open]="menuAbierto" aria-label="Menú">
      <span></span><span></span><span></span>
    </button>

    <ul class="nav-links" [class.open]="menuAbierto">
      <!-- Ofertas -->
      <li>
        <a routerLink="/ofertas" routerLinkActive="active" (click)="cerrarMenu()" class="nav-link nav-link--highlight">
          Ofertas
        </a>
      </li>

      <!-- Productos con submenú -->
      <li class="has-submenu">
        <a routerLink="/productos" routerLinkActive="active" (click)="cerrarMenu()" class="nav-link">
          Productos
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </a>
        <div class="submenu">
          <div class="submenu__grid">
            @for (cat of categorias; track cat.titulo) {
              <div class="submenu__col">
                <h4 class="submenu__title">{{ cat.titulo }}</h4>
                <ul>
                  @for (item of cat.items; track item.marca) {
                    <li>
                      <a routerLink="/productos"
                         [queryParams]="{ marca: item.marca }"
                         (click)="cerrarMenu()"
                         class="submenu__link">
                        {{ item.label }}
                      </a>
                    </li>
                  }
                </ul>
              </div>
            }
          </div>
        </div>
      </li>

      <li>
        <a routerLink="/nosotros" routerLinkActive="active" (click)="cerrarMenu()" class="nav-link">Nosotros</a>
      </li>
      <li>
        <a routerLink="/contacto" routerLinkActive="active" (click)="cerrarMenu()" class="nav-link">Contacto</a>
      </li>
    </ul>
  </div>
</nav>

<!-- Overlay móvil -->
@if (menuAbierto) {
  <div class="nav-overlay" (click)="cerrarMenu()"></div>
}
