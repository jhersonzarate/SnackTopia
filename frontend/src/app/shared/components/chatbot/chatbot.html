<div class="chatbot-box fade-in">
  <div class="chatbot-header">
    <div class="chatbot-header__info">
      <div class="chatbot-avatar"><i class="fa-solid fa-comments icon-inline"></i></div>
      <div>
        <p class="chatbot-name">Bot Snacks</p>
        <p class="chatbot-status"><i class="fa-solid fa-circle icon-inline"></i> En linea</p>
      </div>
    </div>
    <button class="chatbot-close" (click)="cerrar.emit()">×</button>
  </div>

  <div class="chatbot-messages" #mensajesRef>
    @for (msg of mensajes(); track $index) {
      <div class="msg" [class.msg--bot]="msg.rol==='bot'" [class.msg--user]="msg.rol==='user'">
        @if (msg.rol === 'bot') {
          <div class="msg__avatar"><i class="fa-solid fa-robot icon-inline"></i></div>
        }
        <div class="msg__burbuja" [innerHTML]="msg.texto.replace('\n','<br>')"></div>
      </div>
    }
  </div>

  <div class="chatbot-input-area">
    <input
      type="text"
      class="chatbot-input"
      placeholder="Escribe 1–5..."
      [(ngModel)]="inputTexto"
      (keydown)="onKeydown($event)"
    />
    <button class="chatbot-send" (click)="enviar()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>
