<!-- Header -->
<app-header
  (abrirCarrito)="abrirCarrito()"
  (abrirChatbot)="abrirChatbot()"
  (navegarDetalle)="navegarDetalle($event)"
/>

<!-- Navbar -->
<app-navbar />

<!-- Contenido de rutas -->
<main>
  <router-outlet />
</main>

<!-- Footer -->
<app-footer />

<!-- Carrito Lateral -->
@if (carritoAbierto()) {
  <app-overlay (clicked)="cerrarCarrito()" />
  <app-carrito-lateral (cerrar)="cerrarCarrito()" />
}

<!-- Chatbot -->
@if (chatbotAbierto()) {
  <app-chatbot (cerrar)="cerrarChatbot()" />
}

<!-- Botón flotante chatbot -->
<button
  class="chatbot-fab"
  (click)="chatbotAbierto() ? cerrarChatbot() : abrirChatbot()"
  aria-label="Abrir chat"
>
  @if (chatbotAbierto()) {
    <!-- Lucide: X -->
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 6 6 18M6 6l12 12"/>
    </svg>
  } @else {
    <!-- Lucide: MessageCircle -->
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/>
    </svg>
  }
</button>
