<article class="pcard">
  <!-- Imagen -->
  <div class="pcard__img-wrap" (click)="verDetalle.emit(producto.id)">
    <img [src]="producto.imagen" [alt]="producto.nombre" class="pcard__img" loading="lazy" />
    <span class="pcard__badge">-{{ producto.descuento }}%</span>
  </div>

  <!-- Info -->
  <div class="pcard__body">
    <div class="pcard__precios">
      <span class="pcard__precio-final">S/. {{ producto.precioFinal.toFixed(2) }}</span>
      <span class="pcard__precio-original">S/. {{ producto.precioOriginal.toFixed(2) }}</span>
    </div>

    <h3 class="pcard__nombre" (click)="verDetalle.emit(producto.id)">
      {{ producto.nombre }}
    </h3>

    <div class="pcard__footer">
      <button class="pcard__btn" (click)="agregarCarrito.emit(producto)">
        Comprar ahora
      </button>
      <div class="pcard__stars">
        @for (s of estrellas; track $index) {
          <span [class.filled]="s === '★'">{{ s }}</span>
        }
        <small>({{ producto.votos }})</small>
      </div>
    </div>
  </div>
</article>
