<!-- Header principal -->
<header class="header">
  <div class="container header__inner">
    <!-- Logo -->
    <a routerLink="/" class="header__logo">
      <img src="assets/img/logo5.png" alt="Snacktopia Logo" />
    </a>

    <!-- Buscador -->
    <div class="search-wrapper">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input
        type="text"
        class="search-input"
        placeholder="Buscar snacks..."
        [value]="textoBusqueda()"
        (input)="buscar($any($event.target).value)"
      />

      <!-- Sugerencias -->
      @if (mostrarSugerencias()) {
        <div class="sugerencias">
          @for (p of sugerencias(); track p.id) {
            <div class="sugerencia-item" (click)="seleccionarSugerencia(p.id)">
              <img [src]="p.imagen" [alt]="p.nombre" class="sugerencia-img" />
              <div class="sugerencia-info">
                <span class="sugerencia-precio">S/. {{ p.precioFinal.toFixed(2) }}</span>
                <span class="sugerencia-original">S/. {{ p.precioOriginal.toFixed(2) }}</span>
                <span class="sugerencia-nombre">{{ p.nombre }}</span>
              </div>
            </div>
          }
        </div>
      }
    </div>

    <!-- Acciones -->
    <div class="header__actions">
      <!-- Mi Cuenta -->
      @if (auth.isLoggedIn()) {
        <div class="user-menu">
          <button class="btn-cuenta">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            {{ auth.usuarioActivo()?.nombre }}
          </button>
          <div class="user-dropdown">
            <button (click)="logout()" class="dropdown-item dropdown-item--danger">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              Cerrar sesión
            </button>
          </div>
        </div>
      } @else {
        <a routerLink="/auth/login" class="btn-cuenta">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Mi Cuenta
        </a>
      }

      <!-- Carrito -->
      <button class="btn-carrito" (click)="abrirCarrito.emit()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="cart-text">{{ formatTotal() }} ({{ carrito.totalItems() }})</span>
        @if (carrito.totalItems() > 0) {
          <span class="cart-badge">{{ carrito.totalItems() }}</span>
        }
      </button>
    </div>
  </div>
</header>
